<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person Management</title>

    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        margin: 0;
        padding: 0;
    }

    header {
        background-color: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
    }

    .container {
        width: 80%;
        margin: 30px auto;
    }

    h2 {
        text-align: center;
        color: #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    table th,
    table td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    table th {
        background-color: #3498db;
        color: white;
    }

    tr:hover {
        background-color: #f1f1f1;
    }

    .empty {
        text-align: center;
        padding: 20px;
        color: #888;
    }

    footer {
        text-align: center;
        padding: 15px;
        margin-top: 40px;
        background-color: #2c3e50;
        color: white;
    }
    </style>
</head>
<body>

<header>
    <h1>Person Management System</h1>
</header>

<div class="container">
    <h2>All Persons</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Gender</th>
        </tr>

        {% if people %}
            {% for person in people %}
            <tr>
                <td>{{ person.name }}</td>
                <td>{{ person.department }}</td>
                <td>{{ person.gender }}</td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="3" class="empty">No data available</td>
            </tr>
        {% endif %}
    </table>
</div>

<footer>
    <p>&copy; 2026 Django Practice Project</p>
</footer>

</body>
</html>
